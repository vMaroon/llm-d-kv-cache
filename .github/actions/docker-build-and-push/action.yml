name: Docker Build - ghcr
description: Build image using buildx
inputs:
  image-name:
    required: true
    description: Image name
  tag:
    required: true
    description: Image tag
  additional-tags:
    required: false
    description: Newline-separated additional image tags to apply to the same build
    default: ''
  github-token:
    required: true
    description: GitHub token for login
  registry:
    required: true
    description: Container registry (e.g., ghcr.io/llm-d)
  context:
    required: false
    description: Build context path (defaults to repository root)
    default: '.'
  dockerfile:
    required: false
    description: Path to Dockerfile relative to context (defaults to Dockerfile in context)
    default: ''
  platform:
    required: false
    description: Target platform(s) for build (e.g., linux/amd64, linux/amd64,linux/arm64)
    default: 'linux/amd64'
runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_ACTOR: ${{ github.actor }}

    - name: Print image info
      run: |
        echo "Image name: ${IMAGE_NAME}"
        echo "Tag: ${TAG}"
        if [ -n "${ADDITIONAL_TAGS}" ]; then
          echo "Additional tags:"
          printf '%s\n' "${ADDITIONAL_TAGS}"
        fi
        echo "Registry: ${REGISTRY}"
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        TAG: ${{ inputs.tag }}
        ADDITIONAL_TAGS: ${{ inputs.additional-tags }}
        REGISTRY: ${{ inputs.registry }}

    - name: Build image and push
      run: |
        DOCKERFILE_ARG=""
        if [ -n "${DOCKERFILE}" ]; then
          DOCKERFILE_ARG="-f ${DOCKERFILE}"
        fi
        TAG_ARGS=(-t "${REGISTRY}/${IMAGE_NAME}:${TAG}")
        if [ -n "${ADDITIONAL_TAGS}" ]; then
          while IFS= read -r extra_tag; do
            [ -z "${extra_tag}" ] && continue
            TAG_ARGS+=(-t "${REGISTRY}/${IMAGE_NAME}:${extra_tag}")
          done <<< "${ADDITIONAL_TAGS}"
        fi
        docker buildx build \
          --platform ${PLATFORM} \
          ${DOCKERFILE_ARG} \
          "${TAG_ARGS[@]}" \
          --push "${CONTEXT}"
      shell: bash
      env:
        DOCKERFILE: ${{ inputs.dockerfile }}
        REGISTRY: ${{ inputs.registry }}
        IMAGE_NAME: ${{ inputs.image-name }}
        TAG: ${{ inputs.tag }}
        ADDITIONAL_TAGS: ${{ inputs.additional-tags }}
        CONTEXT: ${{ inputs.context }}
        PLATFORM: ${{ inputs.platform }}
