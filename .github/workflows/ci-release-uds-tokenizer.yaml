name: CI - Release - UDS Tokenizer Image

on:
  push:
    tags:
      - 'v*'  # Runs when a tag like v0.1.0 is pushed
  release:
    types: [published]  # Also runs when a GitHub release is published
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Determine tag name
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "tag=${GITHUB_REF##refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF##refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Extract vLLM version from pyproject.toml
        id: vllm
        run: |
          VLLM_VERSION=$(grep -oE 'vllm-[0-9]+\.[0-9]+\.[0-9]+' services/uds_tokenizer/pyproject.toml | head -1 | sed 's/vllm-//')
          if [ -z "${VLLM_VERSION}" ]; then
            echo "Failed to extract vLLM version from services/uds_tokenizer/pyproject.toml" >&2
            exit 1
          fi
          echo "version=${VLLM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=vllm-v${VLLM_VERSION}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and push UDS tokenizer image
        uses: ./.github/actions/docker-build-and-push
        with:
          tag: ${{ steps.tag.outputs.tag }}
          additional-tags: ${{ steps.vllm.outputs.tag }}
          image-name: llm-d-uds-tokenizer
          registry: ghcr.io/${{ github.repository_owner }}
          github-token: ${{ secrets.GHCR_TOKEN }}
          context: services/uds_tokenizer
          dockerfile: services/uds_tokenizer/Dockerfile
          platform: linux/amd64,linux/arm64

      - name: Run Trivy scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ghcr.io/${{ github.repository_owner }}/llm-d-uds-tokenizer:${{ steps.tag.outputs.tag }}